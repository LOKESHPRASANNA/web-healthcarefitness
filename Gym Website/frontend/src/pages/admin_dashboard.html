<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
   
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url("bg.jpg");
        }
        
        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: rgb(203, 201, 201);
            border: 1px solid #ccc;
            border-radius: 5px;
            position: relative;
            
        }
        
        h1 {
            text-align: center;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        table, th, td {
            border: 1px solid #fbfbfb;
            padding: 8px;
            text-align: left;
        }
        
        th {
            background-color: #d4cfcf;
        }

        /* Style for the iframe */
        iframe {
            width: 100%;
            height: 500px; /* Adjust height as needed */
            border: none;
            margin-top: 20px;
            box-shadow:10px 15px 50px rgb(255, 0, 136);
        }

        /* Style for the fullscreen link */
        .fullscreen-link {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        .fullscreen-link a {
            color: #007bff;
            text-decoration:none;
        }

        .fullscreen-link a:hover {
            text-decoration: underline;
        }
        button {
    
    width: 100%;
    padding: 10px;
    background-color: #007bff;
    color: #0b0101;
    border: none;
    cursor: pointer;
    margin-top: 1rem;
    transition: background 0.3s ease;
    
}

button:hover {
    background-color: rgb(255, 255, 255);
}
    </style>
</head>
<body>
    <div class="container">
        <h1>Registered Candidates</h1>
        <div id="candidatesTable"></div>
    </div>
    <a href="index.html"><button type="submit">home</button></a>
    <script>
        // Fetches data from the Spring Boot API and displays it in a table
        function listCandidates() {
            fetch('http://localhost:8080/api/registrations')
            .then(response => response.json())
            .then(values => {
                var candidatesTable = document.getElementById('candidatesTable');
                candidatesTable.innerHTML = '';

                if (values.length > 0) {
                    var table = document.createElement('table');
                    table.classList.add('dataTable');
                    var headerRow = table.insertRow(0);
                    
                    var headers = ['ID', 'Name', 'Email', 'Phone', 'Age', 'Gender', 'Plan', 'Message'];
                    for (var i = 0; i < headers.length; i++) {
                        var headerCell = document.createElement('th');
                        headerCell.textContent = headers[i];
                        headerRow.appendChild(headerCell);
                    }

                    for (var j = 0; j < values.length; j++) {
                        var row = table.insertRow(j + 1);
                        var data = [values[j].id, values[j].name, values[j].email, values[j].phoneNumber, values[j].age, values[j].gender, values[j].plan, values[j].message];
                        for (var k = 0; k < data.length; k++) {
                            var cell = row.insertCell(k);
                            cell.textContent = data[k] || '';
                        }
                    }
                    candidatesTable.appendChild(table);
                } else {
                    candidatesTable.textContent = 'No data found.';
                }
            })
            .catch(error => {
                var candidatesTable = document.getElementById('candidatesTable');
                candidatesTable.textContent = 'Error: ' + error.message;
            });
        }
        
        // Call the function on load
        window.addEventListener('load', listCandidates);
    </script>

    <!-- Link to your JavaScript file -->
    <script src="../js/script.js"></script>

    <!-- Link to your CSS file -->
    <link rel="stylesheet" href="../css/styles.css">
</body>
</html>
