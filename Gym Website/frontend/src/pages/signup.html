<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Website Sign Up</title>
    <link rel="stylesheet" href="../css/signup.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-overlay"></div>
    <div class="signup-container">
        <div class="form-header">
            <h2>Get Started</h2>
            <p class="subtitle">Create your Gym Account</p>
        </div>
        <form id="signupForm">
            <div class="form-group">
                <input type="text" id="fullName" placeholder="Full Name" required>
            </div>
            <div class="form-group">
                <input type="email" id="email" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <input type="text" id="username" placeholder="Username" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <!-- Role is automatically set to 'User' -->
            <input type="hidden" id="role" value="user">
            <button type="submit" class="btn-signup">Sign Up</button>
        </form>
        <p class="signup-footer">Already have an account? <a href="/login" class="link-login">Login Here</a></p>
    </div>

    <script src="../js/signup.js"></script>
</body>
</html>
